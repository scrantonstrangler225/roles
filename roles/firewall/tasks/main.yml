- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default incoming policy
  community.general.ufw:
    direction: incoming
    policy: "{{ ufw_policy_incoming }}"

- name: Set default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: "{{ ufw_policy_outgoing }}"

- name: Allow SSH, HTTP, HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
  loop: "{{ ufw_allowed_ports }}"

- name: Enable UFW logging
  community.general.ufw:
    logging: low

- name: Enable UFW
  community.general.ufw:
    state: enabled
