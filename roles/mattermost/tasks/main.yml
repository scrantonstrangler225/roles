---
- name: Ensure Mattermost container is running
  community.docker.docker_container:
    name: "{{ mattermost_container_name }}"
    image: "{{ mattermost_image }}"
    state: started
    restart_policy: unless-stopped

    networks: "{{ mattermost_networks }}"

    published_ports: "{{ mattermost_ports }}"

    volumes: "{{ mattermost_volumes }}"

    env: "{{ mattermost_env }}"

    security_opts:
      - no-new-privileges:true

        #cap_drop:
        #- ALL

    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8065/api/v4/system/ping
      interval: 30s
      timeout: 10s
      retries: 3
  notify: Restart Mattermost

- name: Wait for Mattermost API
  ansible.builtin.uri:
    url: http://127.0.0.1:8065/api/v4/system/ping
    status_code: 200
  register: mattermost_ready
  retries: 30
  delay: 5
  until: mattermost_ready.status == 200
