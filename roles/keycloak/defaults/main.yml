---
# Container
keycloak_container_name: keycloak
keycloak_version: "26.3"
keycloak_image: "quay.io/keycloak/keycloak:{{ keycloak_version }}"

# Network
keycloak_networks:
  - name: backend

# Ports
keycloak_ports:
  - "8080:8080"

# Volumes
keycloak_volumes:
  - "keycloak_data:/opt/keycloak/data"
    #- "/var/lib/docker/volumes/keycloak_data/_data:/opt/keycloak/data" # may need to uncomment / toggle above
  - "/opt/keycloak/themes:/opt/keycloak/themes"

# Database
keycloak_env:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: "5432"
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password

      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: password

      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: "10.0.0.13" #auth.example.com
      KC_HTTP_ENABLED: "true"

      KC_LOG_LEVEL: INFO
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"

postgres_databases:
  - name: keycloak

postgres_users:
  - name: keycloak
    password: "password"    # later vault_keycloak_db_password
    database: keycloak
