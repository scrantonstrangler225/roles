---
- name: Ensure proxy sites directory exists on host
  file:
    path: "{{ nginx_proxy_sites_path }}"
    state: directory
    mode: "0755"

- name: Render nginx proxy configs
  template:
    src: proxy.conf.j2
    dest: "{{ nginx_proxy_sites_path }}/{{ item.name }}.conf"
  loop: "{{ nginx_proxy_services }}"
  notify: Reload nginx container
