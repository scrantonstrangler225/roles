---
- name: Ensure Grafana data directory exists
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"


# can remove later 
- name: Ensure Grafana provisioning directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ grafana_provisioning_dir }}/datasources"
    - "{{ grafana_provisioning_dir }}/dashboards"

- name: Ensure Grafana container is running
  community.docker.docker_container:
    name: "{{ grafana_container_name }}"
    image: "{{ grafana_image }}"
    state: started
    restart_policy: unless-stopped
    networks: "{{ grafana_networks }}"
    published_ports: "{{ grafana_ports }}"
    volumes:
      - "{{ grafana_data_dir }}:/var/lib/grafana"
      - "{{ grafana_provisioning_dir }}:/etc/grafana/provisioning:ro"
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://localhost:3000/api/health
      interval: 30s
      timeout: 5s
      retries: 3

- name: Ensure Grafana datasource directory exists
  ansible.builtin.file:
    path: "{{ grafana_provisioning_dir }}/datasources"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"

- name: Configure Prometheus datasource
  ansible.builtin.template:
    src: prometheus-datasource.yml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/prometheus.yml"
    owner: "472"
    group: "472"
    mode: "0644"
  notify: Restart Grafana
