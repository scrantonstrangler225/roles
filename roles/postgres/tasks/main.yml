---
- name: Ensure PostgreSQL data directory exists
  ansible.builtin.file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: "999"
    group: "999"
    mode: "0700"

- name: Ensure PostgreSQL container is running
  community.docker.docker_container:
    name: "{{ postgres_container_name }}"
    image: "{{ postgres_image }}"
    state: started
    restart_policy: unless-stopped

    networks: "{{ postgres_networks }}"

    published_ports: "{{ postgres_ports }}"

    volumes:
      - "{{ postgres_data_dir }}:/var/lib/postgresql/data"

    env: "{{ postgres_env }}"

    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U {{ postgres_env.POSTGRES_USER }}"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    security_opts:
      - no-new-privileges:true

    #capabilities:
      #- CAP_CHOWN
      #- CAP_DAC_OVERRIDE
      #- CAP_FOWNER
      #- CAP_SETGID
        #- CAP_SETUID

    #cap_drop:
      # - ALL

  notify: Restart PostgreSQL

- name: Wait for PostgreSQL to become available
  community.docker.docker_container_exec:
    container: "{{ postgres_container_name }}"
    command: >
      pg_isready -U {{ postgres_env.POSTGRES_USER }}
  register: postgres_ready
  retries: 10
  delay: 5
  until: postgres_ready.rc == 0


- name: Configure application databases
  ansible.builtin.include_tasks: database.yml
