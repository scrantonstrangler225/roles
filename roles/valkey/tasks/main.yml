---
- name: Ensure Valkey container is running
  community.docker.docker_container:
    name: "{{ valkey_container_name }}"
    image: "{{ valkey_image }}"
    state: started
    restart_policy: unless-stopped

    networks: "{{ valkey_networks }}"

    published_ports: "{{ valkey_ports }}"

    volumes: "{{ valkey_volumes }}"

    command: "{{ valkey_command }}"

    healthcheck:
      test:
        - CMD
        - valkey-cli
        - ping
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    security_opts:
      - no-new-privileges:true

  notify: Restart Valkey

# get small warning without (memory overcommit)
- name: Enable memory overcommit for database workloads
  ansible.posix.sysctl:
    name: vm.overcommit_memory
    value: "1"
    state: present
    reload: true
