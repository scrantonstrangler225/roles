---
- name: Ensure backup directory exists
  ansible.builtin.file:
    path:"{{ backup_dir }}"
    state: directory
    owner: root
    group: root
    mode:"0755"

- name: Build volume backup commands
  set_fact:
    volume_backup_cmds:>
      {% for vol in backup_volumes %}
      docker run --rm -v {{ vol }}:/volume -v {{ backup_dir }}:/backup alpine \
      tar czf /backup/{{ vol }}_{{ ansible_date_time.date }}.tgz -C /volume . ;
      {% endfor %}

- name: Build config backup commands
  set_fact:
    config_backup_cmds:>
      {% for cfg in backup_configs %}
      tar czf {{ backup_dir }}/{{ cfg | basename }}_{{ ansible_date_time.date }}.tgz -C {{ cfg }} . ;
      {% endfor %}

- name: Combine backup commands
  set_fact:
    all_backup_cmds:"{{ volume_backup_cmds }} {{ config_backup_cmds }}"

- name: Ensure cron job for backups exists
  ansible.builtin.cron:
    name:"Daily backup"
    minute:"{{ backup_schedule.split()[0] }}"
    hour:"{{ backup_schedule.split()[1] }}"
    day:"{{ backup_schedule.split()[2] }}"
    month:"{{ backup_schedule.split()[3] }}"
    weekday:"{{ backup_schedule.split()[4] }}"
    job:"{{ all_backup_cmds }}"

- name: Run backup immediately
  ansible.builtin.shell:"{{ all_backup_cmds }}"
  when: backup_run_now | default(false)
