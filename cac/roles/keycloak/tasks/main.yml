---
- name: Create Keycloak data directory
  ansible.builtin.file:
    path: /opt/keycloak
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create Keycloak themes directory
  ansible.builtin.file:
    path: /opt/keycloak/themes
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy Keycloak themes
  ansible.builtin.copy:
    src: themes/
    dest: /opt/keycloak/themes/
    owner: root
    group: root
    mode: preserve
  notify: Restart Keycloak

- name: Ensure Keycloak container is running
  community.docker.docker_container:
    name: "{{ keycloak_container_name }}"
    image: "{{ keycloak_image }}"
    state: started
    restart_policy: unless-stopped

    command:
      - start

    networks: "{{ keycloak_networks }}"

    published_ports: "{{ keycloak_ports }}"

    volumes: "{{ keycloak_volumes }}"

    env:
      KC_DB: "{{ keycloak_db_vendor }}"
      KC_DB_URL_HOST: "{{ keycloak_db_host }}"
      KC_DB_URL_PORT: "{{ keycloak_db_port }}"
      KC_DB_URL_DATABASE: "{{ keycloak_db_name }}"
      KC_DB_USERNAME: "{{ keycloak_db_user }}"
      KC_DB_PASSWORD: "{{ keycloak_db_password }}"

      KC_BOOTSTRAP_ADMIN_USERNAME: "{{ keycloak_admin_user }}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "{{ keycloak_admin_password }}"

      KC_PROXY_HEADERS: "{{ keycloak_proxy_headers }}"
      KC_HOSTNAME: "{{ keycloak_hostname }}"
      KC_HTTP_ENABLED: "true"

      KC_LOG_LEVEL: "{{ keycloak_log_level }}"
