---
# roles/common/tasks/main.yml

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

